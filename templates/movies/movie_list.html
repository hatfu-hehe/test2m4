<h1>Movies</h1>

<a href="{% url 'movie_add' %}">Add new movie</a>

<div>
{% for movie in movies %}
    <div>
        {% if movie.poster %}
        <img src="{{ movie.poster.url }}" alt="{{ movie.title }}" width="150">
        {% else %}
        <p>No poster</p>
        {% endif %}

        <h2>{{ movie.title }}</h2>
        <a href="{% url 'movie_detail' id=movie.id %}">More</a>
    </div>
    <hr>
{% empty %}
    <p>No movies found</p>
{% endfor %}
</div>
